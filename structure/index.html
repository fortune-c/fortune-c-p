<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fortune-c</title>
  <meta name="description"
    content="Fortunate Adesina — a versatile software engineer building scalable, efficient, and engaging digital solutions." />
  <link rel="stylesheet" href="/styles/output.css" />
  <link rel="icon" type="image/x-icon" href="/assets/logo.png" />
</head>

<body class="bg-[url(../assets/bg.png)] bg-cover bg-center min-h-screen">
  <div class="flex flex-col h-screen m-10 max-md:m-6 max-sm:m-4">
    <!-- Header / Logo -->
    <header class="flex flex-row justify-between">
      <img src="/assets/logo.png" alt="fortune-c logo" class="w-11 h-13 max-sm:w-8 max-sm:h-8" data-animate />
    </header>

    <!-- Name & Title -->
    <div class="flex flex-col items-center mt-6 max-sm:mt-12 mb-4 max-sm:px-2">
      <h1
        class="font-porter text-[48px] max-lg:text-[36px] max-md:text-[28px] max-sm:text-[20px] uppercase tracking-[24.2%] leading-[100%]"
        style="background: linear-gradient(to right, rgba(251, 208, 80, 1), rgba(241, 180, 33, 1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"
        data-animate>
        Fortunate Adesina
      </h1>
      <p
        class="font-jetbrains italic font-extrabold text-[40px] max-lg:text-[30px] max-md:text-[22px] max-sm:text-[16px] leading-[100%] tracking-[24.2%] text-white align-middle lowercase"
        data-animate>
        software engineer
      </p>
    </div>

    <!-- Hero Image + CTA Arrow -->
    <div class="flex flex-col items-center flex-1 justify-center max-sm:justify-start max-sm:mt-2">
      <img src="/assets/hero.svg" alt="3D character illustration"
        class="w-[500px] h-auto max-lg:w-[400px] max-md:w-[350px] max-sm:w-[200px]"
        data-animate />
      <div class="flex flex-col items-center mt-[2px] max-lg:mt-[-5px] max-md:mt-0 max-sm:mt-2 z-10" data-animate>
        <span class="font-jetbrains font-normal text-[11px] max-sm:text-[9px] text-white tracking-[0.4em] mb-4 uppercase">Touch to explore</span>
        <a href="/about"
          class="hover:scale-110 active:scale-95 transition-transform duration-200 ease-out cursor-pointer">
          <img src="/assets/slide-next.svg" alt="Go to About page"
            class="w-[100px] h-[95px] max-md:w-[80px] max-md:h-[76px] max-sm:w-[60px] max-sm:h-[57px]" />
        </a>
      </div>
    </div>
  </div>
  <script src="/scripts/dist/transitions.js"></script>
</body>

</html>
