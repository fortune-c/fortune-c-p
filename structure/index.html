<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fortune-c</title>
  <meta name="description"
    content="Fortunate Adesina — a versatile software engineer building scalable, efficient, and engaging digital solutions." />
  <link rel="stylesheet" href="/styles/output.css" />
  <link rel="icon" type="image/x-icon" href="/assets/logo.png" />
</head>

<body class="bg-[url(../assets/bg.png)] bg-cover bg-center min-h-screen">
  <div class="flex flex-col min-h-[90vh] m-10 max-md:m-6 max-sm:m-4">
    <!-- Header / Logo -->
    <header class="flex flex-row justify-between">
      <img src="/assets/logo.png" alt="fortune-c logo" class="w-11 h-13 max-sm:w-8 max-sm:h-8" data-animate />
    </header>

    <!-- Name & Title -->
    <div class="flex flex-col items-center mt-6 max-sm:mt-8 mb-4 max-sm:px-2">
      <h1
        class="font-porter text-[48px] max-lg:text-[36px] max-md:text-[30px] max-sm:text-[24px] uppercase tracking-[0.2em] leading-tight text-center"
        style="background: linear-gradient(to right, #fbd050, #f1b421); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"
        data-animate>
        Fortunate Adesina
      </h1>
      <p
        class="font-jetbrains italic font-extrabold text-[40px] max-lg:text-[30px] max-md:text-[24px] max-sm:text-[18px] leading-tight tracking-widest text-white/80 align-middle lowercase"
        data-animate>
        software engineer
      </p>
    </div>

    <!-- Hero Image + CTA Arrow -->
    <div class="flex flex-col items-center flex-1 justify-center max-sm:mt-0">
      <img src="/assets/hero.svg" alt="3D character illustration"
        class="w-[500px] h-auto max-lg:w-[400px] max-md:w-[350px] max-sm:w-[260px] drop-shadow-[0_20px_50px_rgba(241,180,33,0.3)]"
        data-animate />
      <div class="flex flex-col items-center gap-2 mt-4 max-sm:mt-6">
        <span class="font-jetbrains text-[10px] text-white/40 uppercase tracking-widest" data-animate>Touch to Explore</span>
        <a href="/about"
          class="hover:scale-110 active:scale-95 transition-transform duration-200 ease-out cursor-pointer z-10"
          data-animate>
          <img src="/assets/slide-next.svg" alt="Go to About page"
            class="w-[80px] h-[76px] max-sm:w-[60px] max-sm:h-[57px] drop-shadow-[0_0_20px_rgba(241,180,33,0.5)]" />
        </a>
      </div>
    </div>
  </div>
  <script src="/scripts/dist/transitions.js"></script>
</body>

</html>
