<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fortune-c | Dashboard</title>
    <link rel="stylesheet" href="/styles/output.css" />
    <link rel="icon" type="image/x-icon" href="/assets/logo.png" />
</head>
<body class="bg-dark-green min-h-screen text-white/90">
    <nav class="border-b border-dark-yellow/30 bg-black/20 backdrop-blur-md px-10 py-4 flex flex-row justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="/assets/logo.png" alt="logo" class="w-8 h-9" />
            <h1 class="font-porter text-lg tracking-[0.2em] text-transparent bg-clip-text bg-linear-to-r from-light-yellow to-dark-yellow">DASHBOARD</h1>
        </div>
        <div class="flex items-center gap-6">
            <span id="admin-user" class="font-jetbrains text-sm text-white/60">...</span>
            <button id="logout-btn" class="font-chela text-light-yellow hover:text-white transition-colors">LOGOUT</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-10 max-sm:p-4">
        <header class="flex flex-row justify-between items-end mb-12">
            <div>
                <h2 class="font-jetbrains font-bold text-3xl uppercase tracking-widest text-white">About Me Settings</h2>
                <div class="h-1 w-20 bg-dark-yellow mt-2"></div>
            </div>
            <button id="save-about-btn" class="bg-dark-yellow text-dark-green px-6 py-3 font-chela font-bold text-lg rounded-sm hover:scale-105 active:scale-95 transition-transform">
                SAVE INFO
            </button>
        </header>

        <section class="mb-20 bg-black/20 p-8 rounded-sm border border-white/10">
            <form id="about-form" class="space-y-6">
                <div>
                    <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Your Bio (Use double newline for paragraphs)</label>
                    <textarea id="about-bio" name="bio" rows="6" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none resize-none" placeholder="Write your story here..."></textarea>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">GitHub URL</label>
                        <input type="url" id="social-github" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-2 text-white font-jetbrains focus:border-dark-yellow focus:outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">LinkedIn URL</label>
                        <input type="url" id="social-linkedin" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-2 text-white font-jetbrains focus:border-dark-yellow focus:outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Instagram URL</label>
                        <input type="url" id="social-instagram" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-2 text-white font-jetbrains focus:border-dark-yellow focus:outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Dribbble URL</label>
                        <input type="url" id="social-dribbble" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-2 text-white font-jetbrains focus:border-dark-yellow focus:outline-none text-sm" />
                    </div>
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Behance URL</label>
                        <input type="url" id="social-behance" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-2 text-white font-jetbrains focus:border-dark-yellow focus:outline-none text-sm" />
                    </div>
                </div>
            </form>
        </section>

        <header class="flex flex-row justify-between items-end mb-12">
            <div>
                <h2 class="font-jetbrains font-bold text-3xl uppercase tracking-widest text-white">Project Management</h2>
                <div class="h-1 w-20 bg-dark-yellow mt-2"></div>
            </div>
            <button id="add-project-btn" class="bg-dark-yellow text-dark-green px-6 py-3 font-chela font-bold text-lg rounded-sm hover:scale-105 active:scale-95 transition-transform">
                + NEW PROJECT
            </button>
        </header>

        <section id="projects-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Project Cards will be injected here -->
            <div class="col-span-full py-20 text-center font-jetbrains text-white/40 italic">
                Scanning for projects...
            </div>
        </section>
    </main>

    <!-- Project Modal -->
    <div id="project-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-100 items-center justify-center p-4 hidden">
        <div class="bg-dark-green border border-dark-yellow w-full max-w-2xl rounded-sm p-8 relative shadow-2xl max-h-[90vh] overflow-y-auto">
            <button id="close-modal" class="absolute top-4 right-4 text-white/60 hover:text-white text-2xl">&times;</button>
            <h3 id="modal-title" class="font-jetbrains text-2xl font-bold uppercase tracking-widest mb-8 border-b border-white/10 pb-4">New Project</h3>
            
            <form id="project-form" class="space-y-6">
                <input type="hidden" id="p-id" name="id" />
                <div class="grid grid-cols-2 gap-6 max-sm:grid-cols-1">
                    <div class="col-span-1">
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Project Title</label>
                        <input type="text" id="p-title" name="title" required class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none" />
                    </div>
                    <div class="col-span-1">
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Subtitle</label>
                        <input type="text" id="p-subtitle" name="subtitle" required class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none" />
                    </div>
                </div>

                <div>
                    <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Description</label>
                    <textarea id="p-desc" name="description" required rows="4" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none resize-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-6 max-sm:grid-cols-1">
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">GitHub Link</label>
                        <input type="url" id="p-github" name="github" required class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none" />
                    </div>
                    <div>
                        <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Live Link (Optional)</label>
                        <input type="url" id="p-live" name="live" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none" />
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="block font-jetbrains text-xs text-white/50 mb-2 uppercase">Project Image</label>
                    <div id="image-preview-container" class="w-full h-40 bg-black/40 border border-white/20 rounded-sm overflow-hidden flex items-center justify-center relative">
                        <img id="p-preview" src="" alt="Preview" class="absolute inset-0 w-full h-full object-cover hidden" />
                        <span id="preview-placeholder" class="text-white/20 font-jetbrains text-xs italic">No image selected</span>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <input type="text" id="p-image" name="imageUrl" required placeholder="/uploads/demo.png" class="w-full bg-black/40 border border-white/20 rounded-sm px-4 py-3 text-white font-jetbrains focus:border-dark-yellow focus:outline-none text-sm" />
                        </div>
                        <label class="cursor-pointer bg-white/10 hover:bg-white/20 px-4 py-3 rounded-sm transition-colors flex items-center justify-center border border-white/10">
                            <span class="font-jetbrains text-xs uppercase text-white/70">Upload</span>
                            <input type="file" id="p-upload" class="hidden" accept="image/*" />
                        </label>
                    </div>
                </div>

                <div class="flex flex-row items-center gap-8 border-t border-white/10 pt-6">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="p-featured" name="featured" class="w-5 h-5 accent-dark-yellow" />
                        <span class="font-jetbrains text-sm">Featured Project</span>
                    </label>
                    <div class="flex-1">
                        <label class="block font-jetbrains text-xs text-white/50 mb-1 uppercase">Display Order</label>
                        <input type="number" id="p-order" name="order" value="0" class="w-20 bg-black/40 border border-white/20 rounded-sm px-3 py-1 text-white font-jetbrains focus:border-dark-yellow focus:outline-none" />
                    </div>
                </div>

                <div class="flex justify-end gap-4 mt-8">
                    <button type="button" id="cancel-modal" class="px-8 py-3 font-chela text-white/60 hover:text-white transition-colors">CANCEL</button>
                    <button type="submit" class="px-10 py-3 bg-linear-to-r from-light-yellow to-dark-yellow text-dark-green font-chela font-bold text-xl rounded-sm hover:scale-105 active:scale-95 transition-transform">SAVE PROJECT</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/scripts/dist/admin.js"></script>
    <script src="/scripts/dist/transitions.js"></script>
</body>
</html>
